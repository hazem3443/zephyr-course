CONFIG_LOG=y
CONFIG_OUR_DRIVER=y

CONFIG_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_I2C_SHELL=y
# CONFIG_SENSOR_SHELL is disabled: Zephyr's built-in sensor shell also
# registers the "sensor" root command, which conflicts with our custom one.
CONFIG_FLASH_SHELL=y
CONFIG_ADC_SHELL=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_KERNEL_SHELL=y